#cloud-config
package_update: true
package_upgrade: false
disable_root: true
ssh_pwauth: false
ssh_deletekeys: false

swap:
  filename: /swapfile
  size: {{DO_SWAP_SIZE}}
  maxsize: {{DO_SWAP_SIZE}}

groups:
  - docker

users:
  - default
  - name: deploy
    gecos: DLsite OPDS Deploy User
    shell: /bin/bash
    lock_passwd: true
    groups:
      - docker
    ssh_authorized_keys:
      - {{SSH_PUBLIC_KEY_YAML}}

write_files:
  - path: /usr/local/bin/reload-dlsite-opds-caddy
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      # Keep in sync with infra/digitalocean/reload-dlsite-opds-caddy.sh
      set -euo pipefail

      CADDY_DIR=/opt/dlsite-opds-caddy
      CADDYFILE="$CADDY_DIR/Caddyfile"

      mkdir -p "$CADDY_DIR"
      chown -R deploy:deploy "$CADDY_DIR"

      {
        for app_dir in /opt/dlsite-opds-nightly /opt/dlsite-opds; do
          if [ ! -s "$app_dir/.env" ]; then
            continue
          fi

          # shellcheck disable=SC1090
          set -a
          source "$app_dir/.env"
          set +a

          if [ -z "${OPDS_DOMAIN:-}" ] || [ -z "${CONTAINER_NAME:-}" ]; then
            echo "Skipping $app_dir: OPDS_DOMAIN and CONTAINER_NAME are required in .env" >&2
            continue
          fi

          external_port="${OPDS_EXTERNAL_PORT:-2580}"
          printf '%s:%s {\n    reverse_proxy %s:2580\n}\n\n' \
            "$OPDS_DOMAIN" "$external_port" "$CONTAINER_NAME"
        done
      } > "$CADDYFILE"

      if [ ! -s "$CADDYFILE" ]; then
        echo "No app environments configured; refusing to start Caddy." >&2
        exit 1
      fi

      cd "$CADDY_DIR"
      docker compose -f docker-compose.caddy.yml up -d

  - path: /usr/local/bin/deploy-dlsite-opds
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      if [ "$#" -ne 1 ]; then
        echo "Usage: deploy-dlsite-opds <app-path>" >&2
        exit 1
      fi

      APP_DIR="$1"

      mkdir -p "$APP_DIR/data"
      chown -R deploy:deploy "$APP_DIR"

      cd "$APP_DIR"

      if [ ! -f docker-compose.app.yml ]; then
        echo "Missing $APP_DIR/docker-compose.app.yml; sync deploy artifacts before deploying." >&2
        exit 1
      fi

      if [ ! -s .env ]; then
        echo "Missing $APP_DIR/.env; refusing to start the server." >&2
        exit 1
      fi

      # shellcheck disable=SC1091
      set -a
      source .env
      set +a

      if [ -z "${CONTAINER_NAME:-}" ]; then
        echo "CONTAINER_NAME is required in $APP_DIR/.env" >&2
        exit 1
      fi

      docker compose -f docker-compose.app.yml pull
      docker compose -f docker-compose.app.yml up -d
      docker image prune -f --filter "until=72h"
      docker logs --tail 100 "$CONTAINER_NAME"

      /usr/local/bin/reload-dlsite-opds-caddy

  - path: /etc/sudoers.d/dlsite-opds-deploy
    owner: root:root
    permissions: "0440"
    content: |
      deploy ALL=(root) NOPASSWD: /usr/local/bin/deploy-dlsite-opds
      deploy ALL=(root) NOPASSWD: /usr/local/bin/reload-dlsite-opds-caddy

  - path: /etc/ssh/ssh_host_ed25519_key
    owner: root:root
    permissions: "0600"
    encoding: b64
    content: {{SSH_HOST_PRIVATE_KEY_B64}}

  - path: /etc/ssh/ssh_host_ed25519_key.pub
    owner: root:root
    permissions: "0644"
    content: {{SSH_HOST_PUBLIC_KEY}}

runcmd:
  - systemctl restart ssh
  - apt-get update
  - apt-get install -y ca-certificates curl git gnupg rsync
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - sh -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - docker network create opds_shared || true
  - mkdir -p /opt/dlsite-opds-caddy /opt/dlsite-opds-nightly/data /opt/dlsite-opds/data
  - chown -R deploy:deploy /opt/dlsite-opds-caddy /opt/dlsite-opds-nightly /opt/dlsite-opds
