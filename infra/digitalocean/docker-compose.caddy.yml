services:
  caddy:
    image: caddy:2-alpine
    container_name: dlsite-opds-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - opds_shared
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  opds_shared:
    external: true

volumes:
  caddy_data:
  caddy_config:
