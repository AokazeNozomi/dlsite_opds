services:
  app:
    image: ghcr.io/aokazenozomi/dlsite_opds:${IMAGE_TAG:-main}
    container_name: dlsite-opds
    restart: always
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "2580"
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:2580/healthz')
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: dlsite-opds-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      OPDS_DOMAIN: ${OPDS_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
